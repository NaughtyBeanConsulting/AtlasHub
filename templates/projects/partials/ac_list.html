<div id="ac-list" class="mb-6">
  <h2 class="section-label">Acceptance criteria{% if criteria %} <span class="font-normal text-n100">({{ criteria|length }})</span>{% endif %}</h2>
  <ul>
    {% for c in criteria %}
      <li class="group flex items-start gap-2.5 rounded-[3px] px-1 py-1 hover:bg-n10">
        {% if can_edit %}
          <input type="checkbox" {% if c.is_done %}checked{% endif %} class="checkbox mt-0.5 cursor-pointer"
                 hx-post="{% url 'projects:ac_toggle' issue.key c.id %}"
                 hx-vals='{"layout": "{{ layout }}"}'
                 hx-target="#ac-list" hx-swap="outerHTML">
        {% else %}
          <input type="checkbox" disabled {% if c.is_done %}checked{% endif %} class="checkbox mt-0.5">
        {% endif %}
        <span class="flex-1 text-sm {% if c.is_done %}text-n100 line-through{% else %}text-n800{% endif %}">{{ c.text }}</span>
        {% if can_edit %}
          <button type="button" class="text-n50 opacity-0 transition-opacity hover:text-red-500 group-hover:opacity-100"
                  hx-post="{% url 'projects:ac_delete' issue.key c.id %}"
                  hx-vals='{"layout": "{{ layout }}"}'
                  hx-target="#ac-list" hx-swap="outerHTML" title="Remove">
            {% include 'components/icons.html' with name='x' class='h-3.5 w-3.5' %}
          </button>
        {% endif %}
      </li>
    {% empty %}
      {% if not can_edit %}<li class="px-1 text-sm italic text-n100">None.</li>{% endif %}
    {% endfor %}
  </ul>
  {% if can_edit %}
    <form hx-post="{% url 'projects:ac_add' issue.key %}" hx-target="#ac-list" hx-swap="outerHTML"
          class="mt-1 flex items-center gap-2">
      <input type="hidden" name="layout" value="{{ layout }}">
      <input name="text" required maxlength="500" placeholder="Add an acceptance criterion…"
             class="input !border-transparent !bg-transparent hover:!border-n40 focus:!border-blue-500">
      <button type="submit" class="btn-subtle">Add</button>
    </form>
  {% endif %}
</div>
