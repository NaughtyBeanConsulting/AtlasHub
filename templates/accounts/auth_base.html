{% extends 'base.html' %}

{% block body %}
<main class="flex min-h-screen flex-col items-center justify-center bg-n20 px-4 py-12">
  <div class="mb-8 flex items-center gap-2.5">
    <span class="flex h-8 w-8 items-center justify-center rounded-[3px] bg-blue-500 text-lg font-bold text-white">A</span>
    <span class="text-2xl font-semibold text-n800">AtlasHub</span>
  </div>
  <div class="card w-full max-w-md p-8 !shadow-overlay">
    {% block card %}{% endblock %}
  </div>
  {% block below_card %}{% endblock %}
  <p class="mt-8 text-xs text-n100">One place for your team's projects and knowledge</p>
</main>
{% endblock %}
