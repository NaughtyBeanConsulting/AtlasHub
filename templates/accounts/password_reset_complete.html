{% extends 'accounts/auth_base.html' %}

{% block title %}Password reset — AtlasHub{% endblock %}

{% block card %}
<div class="flex flex-col items-center gap-3 text-center">
  <span class="flex h-12 w-12 items-center justify-center rounded-full bg-green-50 text-green-500">
    {% include 'components/icons.html' with name='check' class='h-6 w-6' %}
  </span>
  <h1 class="text-base font-semibold text-n800">Your password has been reset</h1>
  <a href="{% url 'accounts:login' %}" class="btn-primary mt-1">Log in</a>
</div>
{% endblock %}
