{% comment %}Render a single form field: label, widget, help text, errors.{% endcomment %}
<div class="mb-4">
  <label for="{{ field.id_for_label }}" class="label">
    {{ field.label }}{% if field.field.required %}<span class="text-red-500"> *</span>{% endif %}
  </label>
  {{ field }}
  {% if field.help_text %}<p class="mt-1 text-xs text-n200">{{ field.help_text }}</p>{% endif %}
  {{ field.errors }}
</div>
