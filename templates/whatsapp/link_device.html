{% extends 'base.html' %}

{% block title %}Link WhatsApp — AtlasHub{% endblock %}

{% block body %}
<main class="flex min-h-[calc(100vh-3.5rem)] flex-col items-center justify-center bg-n20 px-4 py-10">
  <div class="card w-full max-w-md p-8 text-center !shadow-overlay"
       hx-get="{% url 'whatsapp:link_status' %}" hx-trigger="every 3s" hx-swap="innerHTML">
    {% include 'whatsapp/partials/link_status.html' %}
  </div>
  <a href="{% url 'whatsapp:dashboard' %}" class="mt-6 text-sm text-blue-500 hover:underline">
    Back to the WhatsApp dashboard
  </a>
</main>
{% endblock %}
